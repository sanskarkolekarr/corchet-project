version: '3.8'

services:
  web:
    build: .
    container_name: crochet_web
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./.env.local:/app/.env.local
      - ./db:/app/db

  nginx:
    image: nginx:latest
    container_name: crochet_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
